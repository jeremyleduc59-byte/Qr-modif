<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>QR Pro Qty</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3/dist/bwip-js-min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background: #f0f4f8; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #video { width: 100%; max-width: 400px; border-radius: 10px; display: none; background: #000; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; text-decoration: none; }
        .btn-blue { background: #1d6aff; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-outline { background: #eee; color: #444; }
        input { width: 100%; font-size: 32px; text-align: center; border: 2px solid #1d6aff; border-radius: 10px; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .raw-text { font-family: monospace; font-size: 10px; color: #666; word-break: break-all; background: #f8f9fa; padding: 10px; border-radius: 5px; height: 60px; overflow: auto; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h3>📷 SCANNER</h3>
        <video id="video" playsinline></video>
        <button id="start-btn" class="btn btn-blue" onclick="startScan()">▶ Start Camera</button>
    </div>

    <div id="edit-zone" class="card" style="display:none">
        <h3>📦 MODIFICATION (Q)</h3>
        <div class="raw-text" id="old-data"></div>
        <label>Nouvelle Quantité :</label>
        <input type="number" id="qty-input" oninput="generate()">
        <div id="qr-output" style="margin-top:20px; display: flex; justify-content: center; min-height: 150px;"></div>
        <button class="btn btn-green" onclick="download()">💾 Sauvegarder l'image</button>
        <button class="btn btn-outline" onclick="location.reload()">🔄 Nouveau Scan</button>
    </div>

    <script>
        let reader = new ZXing.BrowserMultiFormatReader();
        let rawDataArray = null; // On stocke les données brutes ici

        async function startScan() {
            document.getElementById('video').style.display = 'block';
            document.getElementById('start-btn').style.display = 'none';
            
            // On utilise une méthode qui préserve mieux les caractères spéciaux
            reader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result) {
                    // On récupère le texte avec ses caractères invisibles
                    let text = result.text;
                    // On convertit en tableau de nombres pour ne perdre aucun octet (GS, RS, etc.)
                    rawDataArray = Array.from(text).map(c => c.charCodeAt(0));
                    
                    reader.reset();
                    document.getElementById('video').style.display = 'none';
                    document.getElementById('edit-zone').style.display = 'block';
                    document.getElementById('old-data').innerText = text.replace(/[\x00-\x1F]/g, (match) => `[${match.charCodeAt(0)}]`);
                    
                    // On cherche le Q pour pré-remplir l'input
                    let m = text.match(/Q(\d+)/);
                    if (m) document.getElementById('qty-input').value = m[1];
                    
                    generate();
                }
            });
        }

        function generate() {
            if (!rawDataArray) return;
            let q = document.getElementById('qty-input').value;
            
            // Reconstruction du texte avec les caractères invisibles préservés
            let text = String.fromCharCode(...rawDataArray);
            let modified = text.replace(/Q\d+/, "Q" + q);
            
            let out = document.getElementById('qr-output');
            out.innerHTML = ""; 

            let canvas = document.createElement('canvas');
            try {
                bwipjs.toCanvas(canvas, {
                    bcid: 'datamatrix', 
                    text: modified, 
                    scale: 5, 
                    padding: 10,
                    // Cette option est VITAL : elle dit à BWIP de traiter les caractères spéciaux
                    parsefnc: false 
                }, (err, cvs) => {
                    if (!err) {
                        out.appendChild(cvs);
                    } else {
                        out.innerHTML = "<span style='color:red'>Erreur : " + err + "</span>";
                    }
                });
            } catch (e) {
                console.error(e);
            }
        }

        function download() {
            let cvs = document.querySelector('canvas');
            if (!cvs) return;
            let a = document.createElement('a');
            a.download = "code_modifie.png"; 
            a.href = cvs.toDataURL(); 
            a.click();
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
